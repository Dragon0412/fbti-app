<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBTI 题目优化审阅系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --info: #06b6d4;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-thumbnails {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            max-width: 800px;
        }

        .nav-item {
            width: 40px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .nav-item:hover {
            transform: translateY(-2px);
        }

        .nav-item.pending {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .nav-item.approved {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            border-color: var(--success);
        }

        .nav-item.suggested {
            background: rgba(234, 179, 8, 0.2);
            color: var(--warning);
            border-color: var(--warning);
        }

        .nav-item.critical {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .nav-item.active {
            box-shadow: 0 0 0 3px var(--accent-primary);
        }

        /* Main Content */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1.25rem;
        }

        /* Question Display */
        .question-meta {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-dimension {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-primary);
        }

        .badge-type {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-secondary);
        }

        .badge-status {
            background: rgba(6, 182, 212, 0.2);
            color: var(--info);
        }

        .question-text {
            font-size: 1.125rem;
            line-height: 1.7;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            position: relative;
        }

        .option-label {
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 0.25rem;
        }

        .option-text {
            color: var(--text-primary);
        }

        .option-scores {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .option-scores span {
            display: inline-block;
            background: var(--bg-tertiary);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            margin-right: 0.5rem;
            margin-top: 0.25rem;
        }

        /* Suggestions Panel */
        .suggestion-box {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .suggestion-title {
            color: var(--warning);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .suggestion-content {
            color: var(--text-primary);
        }

        .suggestion-reason {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed var(--border);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .no-suggestion {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .no-suggestion-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        /* Action Buttons */
        .actions-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .actions-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9375rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-warning {
            background: var(--warning);
            color: #1e293b;
        }

        .btn-warning:hover {
            background: #ca8a04;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Notes */
        .notes-section {
            margin-top: 1rem;
        }

        .notes-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .notes-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9375rem;
            resize: vertical;
            min-height: 80px;
        }

        .notes-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        /* Stats Panel */
        .stats-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.25rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .stat-approved { color: var(--success); }
        .stat-pending { color: var(--text-secondary); }
        .stat-suggested { color: var(--warning); }
        .stat-critical { color: var(--danger); }

        .dimension-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .dimension-badge {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .dimension-badge span {
            color: var(--text-secondary);
            margin-left: 0.25rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.25rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* Edit Form */
        .edit-form-group {
            margin-bottom: 1rem;
        }

        .edit-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .edit-input, .edit-textarea {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9375rem;
        }

        .edit-textarea {
            resize: vertical;
            min-height: 60px;
        }

        .edit-input:focus, .edit-textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .option-edit {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .option-edit-header {
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 0.75rem;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.75rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        .legend-dot.approved { background: var(--success); }
        .legend-dot.suggested { background: var(--warning); }
        .legend-dot.critical { background: var(--danger); }
        .legend-dot.pending { background: var(--bg-tertiary); }

        /* Expert Scores */
        .expert-scores {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .score-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            min-width: 100px;
            text-align: center;
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .score-high { color: var(--success); }
        .score-medium { color: var(--warning); }
        .score-low { color: var(--danger); }

        .score-input {
            width: 60px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.25rem;
            color: var(--text-primary);
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Filter Panel */
        .filter-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .filter-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .filter-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .filter-btn.score-high.active {
            background: var(--success);
            border-color: var(--success);
        }

        .filter-btn.score-medium.active {
            background: var(--warning);
            border-color: var(--warning);
            color: #1e293b;
        }

        .filter-btn.score-low.active {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Score summary in nav */
        .nav-item .score-indicator {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .nav-item {
            position: relative;
        }

        /* Suggestion indicator dot */
        .nav-item .suggestion-dot {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background: var(--accent-primary);
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
        }

        /* Readonly input styling */
        .score-input[readonly] {
            background: var(--bg-tertiary);
            cursor: help;
        }

        /* Alert */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-warning {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        /* Highlight */
        .highlight-change {
            background: rgba(234, 179, 8, 0.2);
            border-left: 3px solid var(--warning);
            padding-left: 0.75rem;
            margin-left: -0.75rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-thumbnails {
                max-width: 100%;
                justify-content: center;
            }

            .nav-item {
                width: 36px;
                height: 28px;
                font-size: 0.7rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .nav-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">FBTI 题目优化审阅</div>
            <div class="nav-thumbnails" id="navThumbnails"></div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot approved"></div>
                    <span>已通过</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot suggested"></div>
                    <span>已采纳/自定义</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot critical"></div>
                    <span>低分需关注</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot pending"></div>
                    <span>未审阅</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Filter Panel -->
        <div class="filter-panel">
            <div class="filter-title">🔍 按专家评分筛选</div>
            <div class="filter-options">
                <button class="filter-btn active" onclick="setFilter('all')" id="filter-all">全部题目</button>
                <button class="filter-btn score-high" onclick="setFilter('high')" id="filter-high">保留 (8-10分)</button>
                <button class="filter-btn score-medium" onclick="setFilter('medium')" id="filter-medium">优化 (5-7分)</button>
                <button class="filter-btn score-low" onclick="setFilter('low')" id="filter-low">汰换 (1-4分)</button>
                <button class="filter-btn" onclick="setFilter('unscored')" id="filter-unscored">未评分</button>
            </div>
        </div>

        <div class="content-grid">
            <!-- Original Question -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>📋</span>
                        原始题目
                    </div>
                    <span class="badge badge-status" id="currentStatus">未审阅</span>
                </div>
                <div class="card-body">
                    <div class="expert-scores" id="expertScores">
                        <div class="score-card">
                            <div class="score-label">电影专家</div>
                            <input type="number" class="score-input" id="scoreFilm" min="1" max="10" placeholder="-" onchange="updateExpertScore('film', this.value)" readonly>
                        </div>
                        <div class="score-card">
                            <div class="score-label">心理学专家</div>
                            <input type="number" class="score-input" id="scorePsych" min="1" max="10" placeholder="-" onchange="updateExpertScore('psych', this.value)" readonly>
                        </div>
                        <div class="score-card">
                            <div class="score-label">综合评分</div>
                            <div class="score-value" id="scoreAvg">-</div>
                        </div>
                    </div>
                    <div class="question-meta">
                        <span class="badge badge-dimension" id="dimensionBadge">EA</span>
                        <span class="badge badge-type" id="typeBadge">binary</span>
                    </div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options-list" id="optionsList"></div>
                </div>
            </div>

            <!-- Suggestions -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>💡</span>
                        修改建议
                    </div>
                </div>
                <div class="card-body" id="suggestionPanel">
                    <div class="no-suggestion">
                        <div class="no-suggestion-icon">✅</div>
                        <div>本题暂无修改建议</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions-panel">
            <div class="actions-title">审阅操作</div>
            <div class="action-buttons">
                <button class="btn btn-success" onclick="reviewAction('approved')">
                    <span>✓</span> 通过 - 保持原样
                </button>
                <button class="btn btn-warning" onclick="reviewAction('adopt')" id="adoptBtn" disabled>
                    <span>✎</span> 采纳建议
                </button>
                <button class="btn btn-primary" onclick="openCustomEdit()">
                    <span>✏️</span> 自定义修改
                </button>
            </div>
            <div class="notes-section">
                <div class="notes-label">我的修改建议</div>
                <textarea class="notes-input" id="reviewNotes" rows="4" placeholder="输入你对这道题的修改意见...（如：选项A改为xxx，或者整题替换为xxx）" style="width: 100%;"></textarea>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-buttons">
            <button class="btn btn-secondary" onclick="navigateQuestion(-1)">
                <span>←</span> 上一题
            </button>
            <button class="btn btn-secondary" onclick="navigateQuestion(1)">
                下一题 <span>→</span>
            </button>
        </div>

        <!-- Stats -->

        // State
        let currentIndex = 0;
        let reviewStatus = {}; // { questionId: { status: 'approved'|'adopted'|'custom', notes: '', customData: {} } }
        let expertScores = {}; // { questionId: { film: number, psych: number } }
        let currentFilter = 'all'; // 'all'|'high'|'medium'|'low'|'unscored'
        let userSuggestions = {}; // { questionId: "用户输入的修改建议" }

        // Initialize
        function init() {
            loadFromStorage();
            renderNav();
            renderQuestion();
            updateStats();
        }

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('fbti_review_status');
            if (saved) {
                reviewStatus = JSON.parse(saved);
            }
            const savedScores = localStorage.getItem('fbti_expert_scores');
            if (savedScores) {
                expertScores = JSON.parse(savedScores);
            }
            const savedSuggestions = localStorage.getItem('fbti_user_suggestions');
            if (savedSuggestions) {
                userSuggestions = JSON.parse(savedSuggestions);
            }
        }

        // Get average score for a question
        function getAverageScore(questionId) {
            const film = filmExpertScores[questionId]?.score;
            const psych = psychExpertScores[questionId]?.score;
            if (film !== undefined && psych !== undefined) {
                return Math.round((film + psych) / 2 * 10) / 10;
            }
            return null;
        }

        // Get score level
        function getScoreLevel(avgScore) {
            if (avgScore === null) return 'unscored';
            if (avgScore >= 8) return 'high';
            if (avgScore >= 5) return 'medium';
            return 'low';
        }

        // Get score color class
        function getScoreColorClass(avgScore) {
            const level = getScoreLevel(avgScore);
            if (level === 'high') return 'score-high';
            if (level === 'medium') return 'score-medium';
            if (level === 'low') return 'score-low';
            return '';
        }

        // Save to localStorage
        function saveToStorage() {
            localStorage.setItem('fbti_review_status', JSON.stringify(reviewStatus));
            localStorage.setItem('fbti_expert_scores', JSON.stringify(expertScores));
            localStorage.setItem('fbti_user_suggestions', JSON.stringify(userSuggestions));
        }

        // Save user suggestion for current question
        function saveUserSuggestion() {
            const q = questionsData[currentIndex];
            const suggestionText = document.getElementById('reviewNotes').value.trim();
            if (suggestionText) {
                userSuggestions[q.id] = suggestionText;
            } else {
                delete userSuggestions[q.id];
            }
            saveToStorage();
            renderNav();
        }

        // Update expert score
        function updateExpertScore(type, value) {
            const q = questionsData[currentIndex];
            if (!expertScores[q.id]) {
                expertScores[q.id] = {};
            }
            const numValue = parseInt(value);
            if (numValue >= 1 && numValue <= 10) {
                expertScores[q.id][type] = numValue;
                saveToStorage();
                renderExpertScores();
                renderNav();
                updateStats();
            }
        }

        // Render expert scores
        function renderExpertScores() {
            const q = questionsData[currentIndex];
            const filmScore = filmExpertScores[q.id]?.score || expertScores[q.id]?.film || '';
            const psychScore = psychExpertScores[q.id]?.score || expertScores[q.id]?.psych || '';
            const avgScore = getAverageScore(q.id);

            document.getElementById('scoreFilm').value = filmScore;
            document.getElementById('scorePsych').value = psychScore;

            const avgEl = document.getElementById('scoreAvg');
            if (avgScore !== null) {
                avgEl.textContent = avgScore.toFixed(1);
                avgEl.className = 'score-value ' + getScoreColorClass(avgScore);
            } else {
                avgEl.textContent = '-';
                avgEl.className = 'score-value';
            }

            // Add tooltips with reasons
            const filmInput = document.getElementById('scoreFilm');
            const psychInput = document.getElementById('scorePsych');

            if (filmExpertScores[q.id]) {
                filmInput.title = `电影专家评分: ${filmExpertScores[q.id].score}\n理由: ${filmExpertScores[q.id].reason}`;
            }
            if (psychExpertScores[q.id]) {
                psychInput.title = `心理学专家评分: ${psychExpertScores[q.id].score}\n理由: ${psychExpertScores[q.id].reason}`;
            }
        }

        // Set filter
        function setFilter(filter) {
            currentFilter = filter;

            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');

            renderNav();

            // Navigate to first visible question
            const visibleQuestions = getFilteredQuestions();
            if (visibleQuestions.length > 0) {
                currentIndex = questionsData.indexOf(visibleQuestions[0]);
                renderQuestion();
            }
        }

        // Get filtered questions
        function getFilteredQuestions() {
            if (currentFilter === 'all') return questionsData;

            return questionsData.filter(q => {
                const avgScore = getAverageScore(q.id);
                const level = getScoreLevel(avgScore);
                return level === currentFilter;
            });
        }

        // Render Navigation
        function renderNav() {
            const nav = document.getElementById('navThumbnails');
            const filteredQuestions = getFilteredQuestions();
            const filteredIds = new Set(filteredQuestions.map(q => q.id));

            nav.innerHTML = questionsData.map((q, idx) => {
                const status = reviewStatus[q.id]?.status;
                const avgScore = getAverageScore(q.id);
                const scoreLevel = getScoreLevel(avgScore);

                // Check if this question should be visible
                const isVisible = filteredIds.has(q.id);

                let className = 'nav-item ';
                if (idx === currentIndex) className += 'active ';

                // Apply status-based color (user review status takes priority)
                if (status === 'approved') {
                    className += 'approved ';
                } else if (status === 'adopted' || status === 'custom') {
                    className += 'suggested ';
                } else {
                    // Apply score-based color if no user review status
                    if (scoreLevel === 'high') {
                        className += 'approved ';
                    } else if (scoreLevel === 'medium') {
                        className += 'suggested ';
                    } else if (scoreLevel === 'low') {
                        className += 'critical ';
                    } else {
                        className += 'pending ';
                    }
                }

                // Add suggestion indicator
                if (suggestionsData[q.id] && suggestionsData[q.id].type === 'reconstruct') {
                    className += 'has-reconstruct ';
                }

                const opacity = isVisible ? '1' : '0.2';
                const pointerEvents = isVisible ? 'auto' : 'none';

                const tooltip = `Q${q.id} (${q.primaryDimension})${avgScore !== null ? ` - 综合评分: ${avgScore.toFixed(1)}` : ''}${userSuggestions[q.id] ? ' [已写修改建议]' : ''}`;

                const suggestionDot = userSuggestions[q.id] ? '<div class="suggestion-dot"></div>' : '';

                return `<div class="${className}" onclick="goToQuestion(${idx})" title="${tooltip}" style="opacity: ${opacity}; pointer-events: ${pointerEvents};">Q${q.id}${suggestionDot}</div>`;
            }).join('');
        }

        // Render Question
        function renderQuestion() {
            const q = questionsData[currentIndex];
            const status = reviewStatus[q.id];
            const suggestion = suggestionsData[q.id];
            const avgScore = getAverageScore(q.id);

            // Update badges
            document.getElementById('dimensionBadge').textContent = q.primaryDimension;
            document.getElementById('typeBadge').textContent = q.questionType;

            // Update status badge based on score level
            const statusBadge = document.getElementById('currentStatus');
            const scoreLevel = getScoreLevel(avgScore);

            if (status?.status === 'approved') {
                statusBadge.textContent = '已通过';
                statusBadge.style.background = 'rgba(34, 197, 94, 0.2)';
                statusBadge.style.color = 'var(--success)';
            } else if (status?.status === 'adopted') {
                statusBadge.textContent = '已采纳建议';
                statusBadge.style.background = 'rgba(234, 179, 8, 0.2)';
                statusBadge.style.color = 'var(--warning)';
            } else if (status?.status === 'custom') {
                statusBadge.textContent = '已自定义';
                statusBadge.style.background = 'rgba(59, 130, 246, 0.2)';
                statusBadge.style.color = 'var(--accent-primary)';
            } else {
                // Show score-based status
                if (scoreLevel === 'high') {
                    statusBadge.textContent = '保留';
                    statusBadge.style.background = 'rgba(34, 197, 94, 0.2)';
                    statusBadge.style.color = 'var(--success)';
                } else if (scoreLevel === 'medium') {
                    statusBadge.textContent = '优化';
                    statusBadge.style.background = 'rgba(234, 179, 8, 0.2)';
                    statusBadge.style.color = 'var(--warning)';
                } else if (scoreLevel === 'low') {
                    statusBadge.textContent = '汰换';
                    statusBadge.style.background = 'rgba(239, 68, 68, 0.2)';
                    statusBadge.style.color = 'var(--danger)';
                } else {
                    statusBadge.textContent = suggestion ? (suggestion.type === 'reconstruct' ? '需重构' : '有建议') : '未审阅';
                    statusBadge.style.background = suggestion ? (suggestion.type === 'reconstruct' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(234, 179, 8, 0.2)') : 'rgba(6, 182, 212, 0.2)';
                    statusBadge.style.color = suggestion ? (suggestion.type === 'reconstruct' ? 'var(--danger)' : 'var(--warning)') : 'var(--info)';
                }
            }

            // Render expert scores
            renderExpertScores();

            // Question text
            document.getElementById('questionText').textContent = q.text;

            // Options
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = q.options.map((opt, idx) => {
                const isHighlighted = suggestion && suggestion.type === 'option' && suggestion.optionIndex === idx;
                const scoresText = Object.entries(opt.scores).map(([k, v]) => `${k}:${v}`).join(', ') || '无';
                return `
                    <div class="option-item ${isHighlighted ? 'highlight-change' : ''}">
                        <div class="option-label">选项 ${opt.label}</div>
                        <div class="option-text">${opt.text}</div>
                        <div class="option-scores">计分: ${scoresText}</div>
                    </div>
                `;
            }).join('');

            // Suggestions panel
            const suggestionPanel = document.getElementById('suggestionPanel');
            if (suggestion) {
                if (suggestion.type === 'reconstruct') {
                    suggestionPanel.innerHTML = `
                        <div class="alert alert-danger">
                            <strong>⚠️ ${suggestion.title}</strong>
                            <p style="margin-top: 0.5rem; margin-bottom: 0;">${suggestion.reason}</p>
                        </div>
                    `;
                } else if (suggestion.type === 'full_redesign') {
                    let optionsHtml = suggestion.newOptions.map(opt => `
                        <div class="option-item" style="margin-bottom: 0.5rem;">
                            <div class="option-label">选项 ${opt.label}</div>
                            <div class="option-text">${opt.text}</div>
                            <div class="option-scores">计分: ${Object.entries(opt.scores).map(([k, v]) => `${k}:${v}`).join(', ') || '无'}</div>
                        </div>
                    `).join('');
                    suggestionPanel.innerHTML = `
                        <div class="suggestion-box">
                            <div class="suggestion-title">📝 ${suggestion.title}</div>
                            <div class="suggestion-content">
                                <div style="margin-bottom: 0.75rem;">
                                    <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">新题目：</div>
                                    <div style="font-weight: 600; margin-bottom: 1rem;">${suggestion.newQuestion}</div>
                                </div>
                                <div>
                                    <div style="color: var(--success); font-size: 0.875rem; margin-bottom: 0.5rem;">新选项列表：</div>
                                    ${optionsHtml}
                                </div>
                            </div>
                            <div class="suggestion-reason">
                                <strong>原因：</strong>${suggestion.reason}
                            </div>
                        </div>
                    `;
                } else if (suggestion.type === 'add_options') {
                    let addedOptionsHtml = suggestion.addedOptions.map(opt => `
                        <div class="option-item" style="margin-bottom: 0.5rem; border-color: var(--success);">
                            <div class="option-label">新增选项 ${opt.label}</div>
                            <div class="option-text">${opt.text}</div>
                            <div class="option-scores">计分: ${Object.entries(opt.scores).map(([k, v]) => `${k}:${v}`).join(', ') || '无'}</div>
                        </div>
                    `).join('');
                    suggestionPanel.innerHTML = `
                        <div class="suggestion-box">
                            <div class="suggestion-title">➕ ${suggestion.title}</div>
                            <div class="suggestion-content">
                                <div style="color: var(--success); font-size: 0.875rem; margin-bottom: 0.5rem;">新增选项：</div>
                                ${addedOptionsHtml}
                            </div>
                            <div class="suggestion-reason">
                                <strong>原因：</strong>${suggestion.reason}
                            </div>
                        </div>
                    `;
                } else {
                    const originalOption = q.options[suggestion.optionIndex];
                    suggestionPanel.innerHTML = `
                        <div class="suggestion-box">
                            <div class="suggestion-title">💡 建议修改选项 ${originalOption.label}</div>
                            <div class="suggestion-content">
                                <div style="margin-bottom: 0.75rem;">
                                    <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.25rem;">原内容：</div>
                                    <div style="text-decoration: line-through; opacity: 0.7;">${suggestion.original}</div>
                                </div>
                                <div>
                                    <div style="color: var(--success); font-size: 0.875rem; margin-bottom: 0.25rem;">建议改为：</div>
                                    <div style="color: var(--success);">${suggestion.suggested}</div>
                                </div>
                            </div>
                            <div class="suggestion-reason">
                                <strong>原因：</strong>${suggestion.reason}
                            </div>
                        </div>
                    `;
                }
            } else {
                suggestionPanel.innerHTML = `
                    <div class="no-suggestion">
                        <div class="no-suggestion-icon">✅</div>
                        <div>本题暂无修改建议</div>
                    </div>
                `;
            }

            // Update adopt button - enable for all suggestion types except reconstruct
            document.getElementById('adoptBtn').disabled = !suggestion || suggestion.type === 'reconstruct';

            // Load notes
            document.getElementById('reviewNotes').value = userSuggestions[q.id] || '';

            // Add input listener to auto-save suggestions
            document.getElementById('reviewNotes').oninput = saveUserSuggestion;

            // Update nav
            renderNav();
        }

        // Navigate to question
        function goToQuestion(index) {
            currentIndex = index;
            renderQuestion();
        }

        // Navigate previous/next
        function navigateQuestion(delta) {
            const newIndex = currentIndex + delta;
            if (newIndex >= 0 && newIndex < questionsData.length) {
                currentIndex = newIndex;
                renderQuestion();
            }
        }

        // Review action
        function reviewAction(action) {
            const q = questionsData[currentIndex];
            const suggestion = suggestionsData[q.id];
            
            if (action === 'approved') {
                reviewStatus[q.id] = {
                    status: 'approved',
                    notes: document.getElementById('reviewNotes').value,
                    timestamp: Date.now()
                };
                saveToStorage();
                renderNav();
                renderQuestion();
                updateStats();
                showAlert('success', '✓ 已通过：题目保持原样');
            } else if (action === 'adopt') {
                if (suggestion && (suggestion.type === 'option' || suggestion.type === 'full_redesign' || suggestion.type === 'add_options')) {
                    reviewStatus[q.id] = {
                        status: 'adopted',
                        notes: document.getElementById('reviewNotes').value,
                        suggestion: suggestion,
                        timestamp: Date.now()
                    };
                    saveToStorage();
                    renderNav();
                    renderQuestion();
                    updateStats();
                    showAlert('success', '✓ 已采纳建议：' + (suggestion.type === 'full_redesign' ? '题目已重新设计' : suggestion.type === 'add_options' ? '选项已增加' : '选项已更新'));
                } else {
                    showAlert('warning', '本题没有可采纳的建议');
                }
            }
        }

        // Open custom edit modal
        function openCustomEdit() {
            const q = questionsData[currentIndex];
            const modalBody = document.getElementById('editModalBody');
            
            modalBody.innerHTML = `
                <div class="edit-form-group">
                    <label class="edit-label">题目文本</label>
                    <textarea class="edit-textarea" id="editQuestionText">${q.text}</textarea>
                </div>
                ${q.options.map((opt, idx) => `
                    <div class="option-edit">
                        <div class="option-edit-header">选项 ${opt.label}</div>
                        <div class="edit-form-group">
                            <label class="edit-label">选项文本</label>
                            <textarea class="edit-textarea" id="editOption${idx}">${opt.text}</textarea>
                        </div>
                        <div class="edit-form-group">
                            <label class="edit-label">计分 (格式: E:1,A:0.5)</label>
                            <input type="text" class="edit-input" id="editScores${idx}" value="${Object.entries(opt.scores).map(([k,v]) => `${k}:${v}`).join(',')}">
                        </div>
                    </div>
                `).join('')}
            `;
            
            document.getElementById('editModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // Save custom edit
        function saveCustomEdit() {
            const q = questionsData[currentIndex];
            const customData = {
                text: document.getElementById('editQuestionText').value,
                options: q.options.map((opt, idx) => ({
                    label: opt.label,
                    text: document.getElementById(`editOption${idx}`).value,
                    scores: parseScores(document.getElementById(`editScores${idx}`).value)
                }))
            };
            
            reviewStatus[q.id] = {
                status: 'custom',
                notes: document.getElementById('reviewNotes').value,
                customData: customData,
                timestamp: Date.now()
            };
            
            saveToStorage();
            closeModal();
            renderQuestion();
            updateStats();
            showAlert('success', '已保存自定义修改');
        }

        // Parse scores string
        function parseScores(str) {
            const scores = {};
            str.split(/[,，]/).forEach(part => {
                const [k, v] = part.trim().split(':');
                if (k && v) scores[k.trim()] = parseFloat(v.trim());
            });
            return scores;
        }

        // Show alert
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        // Export suggestions
        function exportSuggestions() {
            const suggestions = [];
            
            Object.entries(userSuggestions).forEach(([questionId, suggestion]) => {
                if (suggestion.trim()) {
                    const q = questionsData.find(q => q.id === parseInt(questionId));
                    if (q) {
                        suggestions.push({
                            id: q.id,
                            dimension: q.primaryDimension,
                            originalText: q.text,
                            suggestion: suggestion
                        });
                    }
                }
            });
            
            // Sort by id
            suggestions.sort((a, b) => a.id - b.id);
            
            const jsonStr = JSON.stringify(suggestions, null, 2);
            document.getElementById('exportJson').textContent = jsonStr;
            document.getElementById('exportModal').classList.add('active');
        }

        // Close export modal
        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('active');
        }

        // Copy to clipboard
        function copyToClipboard() {
            const jsonText = document.getElementById('exportJson').textContent;
            navigator.clipboard.writeText(jsonText).then(() => {
                showAlert('success', '已复制到剪贴板');
            }).catch(err => {
                showAlert('danger', '复制失败，请手动复制');
            });
        }

        // Update stats
        function updateStats() {
            const total = questionsData.length;
            let approvedCount = 0, adoptedCount = 0, customCount = 0, pendingCount = 0;

            questionsData.forEach(q => {
                const status = reviewStatus[q.id]?.status;
                if (status === 'approved') {
                    approvedCount++;
                } else if (status === 'adopted') {
                    adoptedCount++;
                } else if (status === 'custom') {
                    customCount++;
                } else {
                    pendingCount++;
                }
            });

            // Update review status stats
            document.getElementById('statApproved').textContent = approvedCount;
            document.getElementById('statApproved').className = 'stat-value stat-approved';
            document.getElementById('statApproved').nextElementSibling.textContent = '已通过';

            document.getElementById('statPending').textContent = pendingCount;
            document.getElementById('statPending').className = 'stat-value stat-pending';
            document.getElementById('statPending').nextElementSibling.textContent = '待审阅';

            document.getElementById('statSuggested').textContent = adoptedCount;
            document.getElementById('statSuggested').className = 'stat-value stat-suggested';
            document.getElementById('statSuggested').nextElementSibling.textContent = '已采纳建议';

            document.getElementById('statCritical').textContent = customCount;
            document.getElementById('statCritical').className = 'stat-value stat-critical';
            document.getElementById('statCritical').style.color = '';
            document.getElementById('statCritical').nextElementSibling.textContent = '自定义修改';

            // Dimension stats with score breakdown
            const dimensionCount = {};
            questionsData.forEach(q => {
                const dim = q.primaryDimension;
                if (!dimensionCount[dim]) {
                    dimensionCount[dim] = { total: 0, high: 0, medium: 0, low: 0 };
                }
                dimensionCount[dim].total++;

                const avgScore = getAverageScore(q.id);
                const level = getScoreLevel(avgScore);
                if (level === 'high') dimensionCount[dim].high++;
                else if (level === 'medium') dimensionCount[dim].medium++;
                else if (level === 'low') dimensionCount[dim].low++;
            });

            document.getElementById('dimensionStats').innerHTML = Object.entries(dimensionCount)
                .map(([dim, counts]) => {
                    const highPercent = Math.round(counts.high / counts.total * 100);
                    const mediumPercent = Math.round(counts.medium / counts.total * 100);
                    const lowPercent = Math.round(counts.low / counts.total * 100);
                    return `<div class="dimension-badge" title="保留${counts.high}道 | 优化${counts.medium}道 | 汰换${counts.low}道">${dim} <span>${counts.total}题 (保${highPercent}%|优${medium}%|汰${lowPercent}%)</span></div>`;
                })
                .join('');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('editModal').classList.contains('active')) return;
            
            if (e.key === 'ArrowLeft') navigateQuestion(-1);
            if (e.key === 'ArrowRight') navigateQuestion(1);
            if (e.key === '1') reviewAction('approved');
            if (e.key === '2' && !document.getElementById('adoptBtn').disabled) reviewAction('adopt');
            if (e.key === '3') openCustomEdit();
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
